<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Wrenlo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.not-found {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 100px 5%;
  background: var(--ink);
}
.big-num {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(100px, 18vw, 180px);
  line-height: 1; color: rgba(250,248,244,.05);
  letter-spacing: -.04em; margin-bottom: -20px;
  animation: fadeUp .5s ease both;
}
.nf-icon { font-size: 40px; margin-bottom: 20px; animation: fadeUp .5s ease both .1s; }
.nf-title {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(32px, 5vw, 52px);
  color: var(--cream); line-height: 1.05;
  letter-spacing: -.02em; margin-bottom: 16px;
  animation: fadeUp .5s ease both .2s;
}
.nf-title em { font-style: italic; color: var(--amber-mid); }
.nf-sub {
  font-size: 16px; color: rgba(250,248,244,.4);
  font-weight: 300; max-width: 400px;
  line-height: 1.7; margin: 0 auto 36px;
  animation: fadeUp .5s ease both .3s;
}
.nf-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; animation: fadeUp .5s ease both .4s; }
.nf-btn {
  padding: 12px 24px; border-radius: 3px;
  font-size: 14px; font-weight: 500;
  text-decoration: none; transition: all .15s; cursor: pointer; border: none;
}
.nf-btn-primary { background: var(--amber); color: var(--cream); }
.nf-btn-primary:hover { background: var(--amber-mid); }
.nf-btn-outline { background: transparent; color: rgba(250,248,244,.4); border: 1px solid rgba(250,248,244,.1); }
.nf-btn-outline:hover { color: var(--cream); border-color: rgba(250,248,244,.3); }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<nav>
  <div class="nav-inner" style="border-bottom:1px solid rgba(250,248,244,.06)">
    <a href="/" class="logo" style="color:var(--cream)">Wren<span>lo</span></a>
  </div>
</nav>

<div class="not-found">
  <div class="big-num">404</div>
  <div class="nf-icon">🔧</div>
  <h1 class="nf-title">This page needs<br>a <em>wrench.</em></h1>
  <p class="nf-sub">Looks like this page doesn't exist — or maybe it moved. Either way, we've got you covered.</p>
  <div class="nf-actions">
    <a href="/" class="nf-btn nf-btn-primary">← Back to Wrenlo</a>
    <a href="/#survey" class="nf-btn nf-btn-outline">Take the survey</a>
    <a href="mailto:hello@wrenlo.co" class="nf-btn nf-btn-outline">Email us</a>
  </div>
</div>
</body>
</html>
